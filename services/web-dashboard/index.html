<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Functional Integration Mate — Dashboard (Agentic RAG)</title>
    <meta name="description" content="AI-powered integration documentation platform with Agentic RAG and HITL workflows.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <!-- Marked.js for rendering markdown -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <div class="app">
        <!-- Sidebar Navigation -->
        <nav class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">🧠</div>
                <h1>Integration Mate</h1>
            </div>
            <ul class="nav-list">
                <li class="nav-item active" data-page="requirements">
                    <span class="nav-icon">📤</span>
                    <span>Requirements (CSV)</span>
                </li>
                <li class="nav-item" data-page="apis">
                    <span class="nav-icon">🔌</span>
                    <span>API Systems</span>
                </li>
                <li class="nav-item" data-page="agent">
                    <span class="nav-icon">🤖</span>
                    <span>Agent Workspace</span>
                </li>
                <li class="nav-item" data-page="catalog">
                    <span class="nav-icon">📋</span>
                    <span>Integration Catalog</span>
                </li>
                <li class="nav-item" data-page="documents">
                    <span class="nav-icon">📄</span>
                    <span>Generated Docs</span>
                </li>
                <li class="nav-item" data-page="approvals">
                    <span class="nav-icon">✅</span>
                    <span>HITL Approvals (RAG)</span>
                </li>
            </ul>
            <div class="sidebar-footer">
                <div class="service-status" id="serviceStatus">
                    <span class="status-dot"></span>
                    <span>Checking...</span>
                </div>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-bar">
                <h2 id="pageTitle">Upload Requirements</h2>
                <div class="user-info">
                    <select id="userSelect" class="user-select">
                        <option value="admin">👤 Mario Rossi (Admin)</option>
                        <option value="reviewer">👤 Laura Bianchi (Reviewer)</option>
                    </select>
                </div>
            </header>

            <div class="content-area" id="contentArea">
                <!-- Dynamic content loaded here -->
                <div class="loading">Loading...</div>
            </div>
        </main>
    </div>

    <!-- Status Bar -->
    <footer class="status-bar">
        <span id="statusServices">Services: checking...</span>
        <span id="statusTime"></span>
    </footer>

    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
