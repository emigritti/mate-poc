# Included by nginx as /etc/nginx/conf.d/default.conf (inside http {} context).
# ═══════════════════════════════════════════════════════════
# Integration Mate — Nginx Gateway
# Concentra tutta la comunicazione browser→backend su porta 8080.
# Elimina il bisogno di aprire le porte 4001/4002/4003 sul firewall.
# ═══════════════════════════════════════════════════════════

server {
    listen 80;
    server_name _;

    server_tokens off;

    # ── Security response headers ──────────────────────────
    add_header X-Content-Type-Options    "nosniff"                    always;
    add_header X-Frame-Options           "SAMEORIGIN"                 always;
    add_header X-XSS-Protection          "1; mode=block"              always;
    add_header Referrer-Policy           "no-referrer-when-downgrade" always;

    # ── Web Dashboard (SPA React) ──────────────────────────
    location / {
        proxy_pass         http://mate-web-dashboard:80/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Integration Agent  /agent/... → /... ──────────────
    # proxy_read_timeout esteso: Ollama può richiedere minuti su CPU
    location /agent/ {
        proxy_pass         http://mate-integration-agent:3003/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        client_max_body_size 20m;
        proxy_http_version  1.1;
        proxy_buffering     off;
    }

    # ── PLM Mock  /plm/... → /... ─────────────────────────
    location /plm/ {
        proxy_pass         http://mate-plm-mock:3001/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── PIM Mock  /pim/... → /... ─────────────────────────
    location /pim/ {
        proxy_pass         http://mate-pim-mock:3002/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── n8n Orchestrator ──────────────────────────────────
    # Architecture: n8n with N8N_PATH=/n8n/ has a split routing model:
    #   SPA (editor UI)  → Express mounts at /n8n/    (WITH prefix)
    #   REST API         → Express mounts at /rest/    (NO prefix — hardcoded in n8n)
    #   Push WebSocket   → Express mounts at /push     (NO prefix)
    #   Webhooks         → Express mounts at /webhook/ and /webhook-test/ (NO prefix)
    #   Static assets    → Express mounts at /assets/ and /static/ (NO prefix)
    #
    # nginx strategy: more-specific prefix locations take priority over /n8n/.
    # All non-SPA locations strip /n8n/ with rewrite+break before proxy_pass.

    # REST API — strip /n8n/ prefix (n8n Express has /rest/ at root, not /n8n/rest/)
    location /n8n/rest/ {
        rewrite ^/n8n/(.*)  /$1 break;
        proxy_pass         http://mate-n8n:5678;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Push WebSocket — strip /n8n/ prefix (n8n mounts /push at root)
    location /n8n/push {
        rewrite ^/n8n/(.*)  /$1 break;
        proxy_pass         http://mate-n8n:5678;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Webhooks — strip /n8n/ prefix (n8n mounts /webhook/ at root)
    location /n8n/webhook/ {
        rewrite ^/n8n/(.*)  /$1 break;
        proxy_pass         http://mate-n8n:5678;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location /n8n/webhook-test/ {
        rewrite ^/n8n/(.*)  /$1 break;
        proxy_pass         http://mate-n8n:5678;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Static JS/CSS bundles — strip /n8n/ prefix (served by n8n at /assets/)
    location /n8n/assets/ {
        rewrite ^/n8n/(.*)  /$1 break;
        proxy_pass         http://mate-n8n:5678;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Static CSS/JS from /static/ — strip /n8n/ prefix (served by n8n at /static/)
    location /n8n/static/ {
        rewrite ^/n8n/(.*)  /$1 break;
        proxy_pass         http://mate-n8n:5678;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Node icons — strip /n8n/ prefix (n8n serves icons at /icons/, not /n8n/icons/)
    # Required for the workflow editor to load node type icons; missing this causes
    # "Could not fetch node types" because the SPA JS bundle fails to initialise.
    location /n8n/icons/ {
        rewrite ^/n8n/(.*)  /$1 break;
        proxy_pass         http://mate-n8n:5678;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # SPA root — keep /n8n/ prefix (n8n Express mounts editor SPA at /n8n/)
    location /n8n/ {
        proxy_pass         http://mate-n8n:5678/n8n/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
