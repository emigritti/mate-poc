# Included by nginx as /etc/nginx/conf.d/default.conf (inside http {} context).
# ═══════════════════════════════════════════════════════════
# Integration Mate — Nginx Gateway
# Concentra tutta la comunicazione browser→backend su porta 8080.
# Elimina il bisogno di aprire le porte 4001/4002/4003 sul firewall.
# ═══════════════════════════════════════════════════════════

# WebSocket upgrade map — used by n8n proxy locations.
# Allows a single location block to handle both HTTP and WebSocket requests:
#   $http_upgrade == "websocket"  →  Connection: upgrade
#   $http_upgrade == ""           →  Connection: keep-alive
map $http_upgrade $connection_upgrade {
    default   upgrade;
    ''        keep-alive;
}

server {
    listen 80;
    server_name _;

    server_tokens off;

    # ── Security response headers ──────────────────────────
    add_header X-Content-Type-Options    "nosniff"                    always;
    add_header X-Frame-Options           "SAMEORIGIN"                 always;
    add_header X-XSS-Protection          "1; mode=block"              always;
    add_header Referrer-Policy           "no-referrer-when-downgrade" always;

    # ── Web Dashboard (SPA React) ──────────────────────────
    location / {
        proxy_pass         http://mate-web-dashboard:80/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Integration Agent  /agent/... → /... ──────────────
    # proxy_read_timeout esteso: Ollama può richiedere minuti su CPU
    location /agent/ {
        proxy_pass         http://mate-integration-agent:3003/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        client_max_body_size 20m;
        proxy_http_version  1.1;
        proxy_buffering     off;
    }

    # ── PLM Mock  /plm/... → /... ─────────────────────────
    location /plm/ {
        proxy_pass         http://mate-plm-mock:3001/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── PIM Mock  /pim/... → /... ─────────────────────────
    location /pim/ {
        proxy_pass         http://mate-pim-mock:3002/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Ingestion Platform  /ingestion/... → /... ─────────
    location /ingestion/ {
        proxy_pass         http://mate-ingestion-platform:4006/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        client_max_body_size 1m;
    }

    # ── n8n Orchestrator ──────────────────────────────────
    # n8n with N8N_PATH=/n8n/ has a split routing model:
    #
    #   Path served by n8n Express     | Prefix?  | nginx strategy
    #   --------------------------------|----------|---------------------------
    #   /n8n/  (editor SPA)            | YES      | keep prefix → proxy /n8n/
    #   /rest/                          | NO       | strip /n8n/ prefix
    #   /push  (WebSocket)              | NO       | strip /n8n/ prefix
    #   /webhook/, /webhook-test/       | NO       | strip /n8n/ prefix
    #   /assets/, /static/              | NO       | strip /n8n/ prefix
    #   /icons/, /types/, /fonts/       | NO       | strip /n8n/ prefix
    #   /healthz, /form/, /form-waiting | NO       | strip /n8n/ prefix
    #
    # nginx priority: regex locations (~) win over non-^~ prefix locations.
    # ONE regex location handles ALL non-SPA n8n paths (strip /n8n/ prefix).
    # The prefix location /n8n/ catches everything else (SPA routes, deep links).

    # Non-SPA n8n paths — strip /n8n/ prefix before forwarding.
    # Regex wins over the /n8n/ prefix location for these known root-level paths.
    # To add a new path: append "|newpath" to the alternation group.
    #
    # proxy_buffering off: required for /push (SSE stream).
    # n8n v1+ delivers credential/node types and real-time events via Server-Sent
    # Events on /push. nginx default buffering silently drops SSE messages until
    # the buffer fills, so the editor never receives init data and shows
    # "Could not fetch credential types" with no visible HTTP request in DevTools.
    location ~ ^/n8n/(rest|push|webhook|webhook-test|assets|static|icons|types|fonts|healthz|form|form-waiting)(/|$) {
        rewrite ^/n8n/(.*)  /$1 break;
        proxy_pass         http://mate-n8n:5678;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
        proxy_buffering    off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # SPA + deep links — keep /n8n/ prefix (n8n mounts editor SPA at /n8n/).
    # Matched for /n8n/workflow/123, /n8n/credentials, /n8n/executions, etc.
    location /n8n/ {
        proxy_pass         http://mate-n8n:5678/n8n/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
