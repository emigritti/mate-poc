# ═══════════════════════════════════════════════════════════
# Functional Integration Mate PoC — Docker Compose (Agentic RAG)
# Containers: MongoDB, ChromaDB, Ollama, MinIO,
#             PLM Mock, PIM Mock, DAM Mock,
#             Security Middleware, Catalog Generator,
#             Integration Agent, Web Dashboard
#
# Secrets: all sensitive values read from environment variables.
#   Copy .env.example → .env and fill in real values before first run.
#   The :-default syntax provides PoC-only fallbacks so the stack
#   starts without a .env file (insecure dev mode only).
# ═══════════════════════════════════════════════════════════

# Default log rotation applied to every service (override per-service if needed)
x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:

  # ── Data & Vector Layer ─────────────────────────────────

  mongodb:
    image: mongo:7
    container_name: mate-mongodb
    # NOTE: --quiet removed temporarily for diagnostics; restore after confirming startup
    command: ["mongod"]
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - integration-mate-net
    healthcheck:
      test: mongosh --eval "db.adminCommand('ping')" --quiet
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging: *default-logging

  chromadb:
    image: chromadb/chroma:0.5.3
    container_name: mate-chromadb
    ports:
      - "8000:8000"
    volumes:
      - chroma-data:/chroma/chroma
    environment:
      - ANONYMIZED_TELEMETRY=FALSE
      - CHROMA_SERVER_LOG_LEVEL=WARNING
    networks:
      - integration-mate-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/heartbeat')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    logging: *default-logging

  # ── AI Layer ────────────────────────────────────────────

  ollama:
    image: ollama/ollama
    container_name: mate-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - integration-mate-net
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    logging: *default-logging

  ollama-init:
    image: ollama/ollama
    container_name: mate-ollama-init
    # Pull the configured model into the shared ollama-data volume.
    # Idempotent: if the model is already present, exits in seconds.
    # integration-agent depends on service_completed_successfully so it
    # never starts a generation job against a missing model.
    entrypoint: ["/bin/sh", "-c", "ollama pull ${OLLAMA_MODEL:-qwen2.5:14b}"]
    environment:
      - OLLAMA_HOST=http://mate-ollama:11434
    depends_on:
      ollama:
        condition: service_healthy
    networks:
      - integration-mate-net
    restart: "no"
    logging: *default-logging

  # ── Object Storage Layer ───────────────────────────────

  minio:
    image: minio/minio
    container_name: mate-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      # ADR-016: read from env vars; PoC fallback to minioadmin if not set
      - MINIO_ROOT_USER=${S3_ACCESS_KEY:-minioadmin}
      - MINIO_ROOT_PASSWORD=${S3_SECRET_KEY:-minioadmin}
    volumes:
      - minio-data:/data
    networks:
      - integration-mate-net
    healthcheck:
      test: curl -f http://localhost:9000/minio/health/live || exit 1
      interval: 30s
      timeout: 5s
      retries: 3
    logging: *default-logging

  # ── Mock Systems Layer ─────────────────────────────────

  plm-mock:
    build:
      context: ./services/plm-mock-api
      dockerfile: Dockerfile
    container_name: mate-plm-mock
    ports:
      - "4001:3001"
    environment:
      - S3_ENDPOINT=http://mate-minio:9000
      # ADR-016: read from env vars; PoC fallback only
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:-minioadmin}
      - S3_SECRET_KEY=${S3_SECRET_KEY:-minioadmin}
    depends_on:
      minio:
        condition: service_started
    networks:
      - integration-mate-net
    healthcheck:
      test: curl -f http://localhost:3001/health || exit 1
      interval: 30s
      timeout: 5s
      retries: 3
    logging: *default-logging

  pim-mock:
    build:
      context: ./services/pim-mock-api
      dockerfile: Dockerfile
    container_name: mate-pim-mock
    ports:
      - "4002:3002"
    environment:
      - S3_ENDPOINT=http://mate-minio:9000
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:-minioadmin}
      - S3_SECRET_KEY=${S3_SECRET_KEY:-minioadmin}
    depends_on:
      minio:
        condition: service_started
    networks:
      - integration-mate-net
    healthcheck:
      test: curl -f http://localhost:3002/health || exit 1
      interval: 30s
      timeout: 5s
      retries: 3
    logging: *default-logging

  dam-mock:
    build:
      context: ./services/dam-mock-api
      dockerfile: Dockerfile
    container_name: mate-dam-mock
    ports:
      - "4005:3005"
    environment:
      - S3_ENDPOINT=http://mate-minio:9000
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:-minioadmin}
      - S3_SECRET_KEY=${S3_SECRET_KEY:-minioadmin}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:8080,http://localhost:3000,http://localhost:5173}
    depends_on:
      minio:
        condition: service_started
    networks:
      - integration-mate-net
    healthcheck:
      test: curl -f http://localhost:3005/health || exit 1
      interval: 30s
      timeout: 5s
      retries: 3
    logging: *default-logging

  # ── Security Layer ─────────────────────────────────────

  security-middleware:
    build:
      context: ./services/security-middleware
      dockerfile: Dockerfile
    container_name: mate-security-middleware
    ports:
      - "4000:3000"
    environment:
      # ADR-016: JWT_SECRET MUST be overridden in production via .env
      - JWT_SECRET=${JWT_SECRET:-dev-only-change-in-production}
      - JWT_EXPIRY_SECONDS=${JWT_EXPIRY_SECONDS:-3600}
      # Per-service API keys (PoC dev fallbacks only)
      - API_KEY_AGENT=${API_KEY:-agent-key-dev}
      - API_KEY_CATALOG=${API_KEY_CATALOG:-catalog-key-dev}
      - API_KEY_PLM=${API_KEY_PLM:-plm-key-dev}
      - API_KEY_PIM=${API_KEY_PIM:-pim-key-dev}
      - API_KEY_DAM=${API_KEY_DAM:-dam-key-dev}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:8080,http://localhost:3000,http://localhost:5173}
    networks:
      - integration-mate-net
    healthcheck:
      test: curl -f http://localhost:3000/health || exit 1
      interval: 30s
      timeout: 5s
      retries: 3
    logging: *default-logging

  # ── Catalog Composition Layer ──────────────────────────

  catalog-generator:
    build:
      context: ./services/catalog-generator
      dockerfile: Dockerfile
    container_name: mate-catalog-generator
    ports:
      - "4004:3004"
    environment:
      - AGENT_BASE_URL=http://mate-integration-agent:3003
      - AGENT_API_KEY=${API_KEY:-}
      - AGENT_TIMEOUT_SECONDS=30
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:8080,http://localhost:3000,http://localhost:5173}
    depends_on:
      integration-agent:
        condition: service_started
    networks:
      - integration-mate-net
    healthcheck:
      test: curl -f http://localhost:3004/health || exit 1
      interval: 30s
      timeout: 5s
      retries: 3
    logging: *default-logging

  # ── Agent Layer ────────────────────────────────────────

  integration-agent:
    build:
      context: ./services/integration-agent
      dockerfile: Dockerfile
    container_name: mate-integration-agent
    ports:
      - "4003:3003"
    # Mount project-root files that are outside the Docker build context so that
    # prompt_builder.py can load them at runtime via Path(__file__).parent.parent.parent.
    # The paths resolve to /reusable-meta-prompt.md and /template/... inside the container.
    volumes:
      - ./reusable-meta-prompt.md:/reusable-meta-prompt.md:ro
      - ./template:/template:ro
      - ./docs:/app/docs:ro
      - ./HOW-TO:/app/HOW-TO:ro
    environment:
      - OLLAMA_HOST=http://mate-ollama:11434
      # OLLAMA_MODEL: model selection for t3.2xlarge (8 vCPU, 32 GB RAM, no GPU)
      # qwen2.5:14b  → good quality  ( ~9 GB RAM, ~4 tok/s,  ~8 min/doc)  ← DEFAULT
      # qwen2.5:32b  → best quality  (~19 GB RAM, ~1.5 tok/s, ~20 min/doc) — needs GPU
      # llama3.1:8b  → baseline      ( ~6 GB RAM, ~6 tok/s,  ~6 min/doc)
      # Override: OLLAMA_MODEL=qwen2.5:32b docker compose up -d integration-agent
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen2.5:14b}
      # httpx timeout for Ollama call: qwen2.5:14b @ 4 tok/s × 2000 tok ≈ 500s — 900s with margin
      - OLLAMA_TIMEOUT_SECONDS=${OLLAMA_TIMEOUT_SECONDS:-900}
      - CHROMA_HOST=mate-chromadb
      - MONGO_URI=mongodb://mate-mongodb:27017
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:8080,http://localhost:3000,http://localhost:5173}
      - TAG_NUM_PREDICT=${TAG_NUM_PREDICT:-50}
      - TAG_TIMEOUT_SECONDS=${TAG_TIMEOUT_SECONDS:-60}
      - TAG_TEMPERATURE=${TAG_TEMPERATURE:-0.0}
      - DOCS_ROOT=/app
      # API_KEY: set this env var to enable token auth; leave unset for open PoC mode
    depends_on:
      mongodb:
        condition: service_started
      chromadb:
        condition: service_started
      ollama:
        condition: service_started
      ollama-init:
        condition: service_completed_successfully
    networks:
      - integration-mate-net
    healthcheck:
      test: curl -f http://localhost:3003/health || exit 1
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging: *default-logging

  # ── Ingestion Platform Layer ───────────────────────────

  ingestion-platform:
    build:
      context: ./services/ingestion-platform
      dockerfile: Dockerfile
    container_name: mate-ingestion-platform
    ports:
      - "4006:4006"
    environment:
      - MONGO_URI=mongodb://mate-mongodb:27017
      - CHROMA_HOST=mate-chromadb
      - CHROMA_PORT=8000
      - INTEGRATION_AGENT_URL=http://mate-integration-agent:3003
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:8080,http://localhost:3000,http://localhost:5173}
      # Set ANTHROPIC_API_KEY in .env — required for HTML collector (Phase 4)
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      # API_KEY: optional, set to enable token-based auth on ingest trigger endpoints
      - API_KEY=${API_KEY:-}
    depends_on:
      mongodb:
        condition: service_started
      chromadb:
        condition: service_started
    networks:
      - integration-mate-net
    healthcheck:
      test: curl -f http://localhost:4006/health || exit 1
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging: *default-logging

  n8n:
    image: n8nio/n8n:latest
    container_name: mate-n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      # N8N_PATH must match the nginx location prefix so n8n serves assets at /n8n/
      - N8N_PATH=/n8n/
      # WEBHOOK_URL: set EC2_PUBLIC_IP (or domain) in .env — falls back to localhost for local dev
      - WEBHOOK_URL=http://${EC2_PUBLIC_IP:-localhost}:8080/n8n/
      - N8N_EDITOR_BASE_URL=http://${EC2_PUBLIC_IP:-localhost}:8080/n8n/
      # n8n v1+ uses built-in user management (owner account setup on first run).
      # N8N_BASIC_AUTH_ACTIVE is deprecated in v1+ and causes 401 on /rest/settings,
      # breaking the settings store initialization in the frontend.
      # N8N_SECURE_COOKIE=false required for HTTP (non-HTTPS) access.
      # For production, set up TLS and remove this override.
      - N8N_SECURE_COOKIE=${N8N_SECURE_COOKIE:-false}
    volumes:
      - n8n-data:/home/node/.n8n
      - ./workflows/n8n:/home/node/.n8n/workflows:ro
    depends_on:
      ingestion-platform:
        condition: service_healthy
    networks:
      - integration-mate-net
    healthcheck:
      # n8n image (node:alpine) does not include curl — use wget instead.
      test: wget -q --spider http://localhost:5678/healthz || exit 1
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
    logging: *default-logging

  n8n-init:
    image: n8nio/n8n:latest
    container_name: mate-n8n-init
    # Imports all workflow JSON files from the mounted workflows directory
    # into n8n's SQLite DB. Idempotent: re-running updates existing workflows.
    # Runs after n8n is healthy so the DB is fully initialized before import.
    entrypoint: ["/bin/sh", "-c", "n8n import:workflow --separate --input=/workflows && echo 'Workflow import complete.'"]
    volumes:
      - n8n-data:/home/node/.n8n
      - ./workflows/n8n:/workflows:ro
    depends_on:
      n8n:
        condition: service_healthy
    networks:
      - integration-mate-net
    restart: "no"
    logging: *default-logging

  # ── Frontend Layer ─────────────────────────────────────

  # ── Gateway Layer ─────────────────────────────────────
  # Reverse proxy unico su porta 8080: elimina la necessità di
  # aprire le porte 4001/4002/4003 sul firewall aziendale.
  gateway:
    build:
      context: ./services/gateway
      dockerfile: Dockerfile
    container_name: mate-gateway
    ports:
      - "8080:80"
    depends_on:
      - web-dashboard
      - integration-agent
      - plm-mock
      - pim-mock
    networks:
      - integration-mate-net
    healthcheck:
      test: curl -f http://localhost:80/ || exit 1
      interval: 30s
      timeout: 5s
      retries: 3
    logging: *default-logging

  web-dashboard:
    build:
      context: ./services/web-dashboard
      dockerfile: Dockerfile
    container_name: mate-web-dashboard
    # Porta non esposta all'esterno: il traffico arriva tramite il gateway
    expose:
      - "80"
    networks:
      - integration-mate-net
    healthcheck:
      test: curl -f http://localhost:80/ || exit 1
      interval: 30s
      timeout: 5s
      retries: 3
    logging: *default-logging

# ── Volumes ────────────────────────────────────────────

volumes:
  mongo-data:
  chroma-data:
  ollama-data:
  minio-data:
  n8n-data:

# ── Networks ───────────────────────────────────────────

networks:
  integration-mate-net:
    driver: bridge
